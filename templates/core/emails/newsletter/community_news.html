<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #2196F3; color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📢 Community News</h2>
        </div>
        <h3>{{ news_subject }}</h3>
        <div>{{ news_content|linebreaks }}</div>
        <p>Thank you for being part of our sustainable fashion community! 🌱</p>
    </div>
</body>
</html>
